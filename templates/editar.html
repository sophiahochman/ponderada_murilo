<!DOCTYPE strict>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Leitura | Estação Meteorológica</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .form-group {
            margin-bottom: 24px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(0,0,0,0.05);
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.8);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            transition: var(--transition-normal);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .btn-primary {
            background-color: var(--accent-blue);
            color: white;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .btn-secondary {
            background-color: rgba(0,0,0,0.05);
            color: var(--text-muted);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background-color: rgba(0,0,0,0.1);
            color: var(--text-main);
        }
        .feedback {
            margin-top: 16px;
            padding: 16px;
            border-radius: var(--radius-sm);
            display: none;
            font-weight: 500;
        }
        .feedback.success { display: block; background: rgba(16, 185, 129, 0.15); color: #047857; border: 1px solid rgba(16,185,129,0.3); }
        .feedback.error { display: block; background: rgba(239, 68, 68, 0.15); color: #b91c1c; border: 1px solid rgba(239,68,68,0.3); }
    </style>
</head>
<body class="light-mode">
    <div class="container" style="max-width: 800px;">
        <!-- Header -->
        <header class="glass-panel">
            <nav class="main-nav">
                <a href="/" class="nav-link">Dashboard</a>
                <a href="/historico" class="nav-link">Histórico Completo</a>
            </nav>
            <div class="header-content">
                <div>
                    <h1>Corrigir Leitura <span style="color: var(--accent-purple);">#{{ id_leitura }}</span></h1>
                    <p class="subtitle">Atualização manual de dados de telemetria</p>
                </div>
            </div>
        </header>

        <main>
            <!-- Forms Container -->
            <div class="glass-panel" style="padding: 36px;">
                <form id="edit-form" data-id="{{ id_leitura }}">
                    
                    <!-- Feedback visual -->
                    <div id="form-feedback" class="feedback"></div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                        <div class="form-group">
                            <label class="form-label" for="temperatura"><i data-feather="thermometer" class="icon-small icon-orange"></i> Temperatura (°C)</label>
                            <input type="number" step="0.01" id="temperatura" name="temperatura" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="umidade"><i data-feather="droplet" class="icon-small icon-blue"></i> Umidade (%)</label>
                            <input type="number" step="0.01" id="umidade" name="umidade" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="pressao"><i data-feather="wind" class="icon-small icon-teal"></i> Pressão (hPa)</label>
                            <input type="number" step="0.01" id="pressao" name="pressao" class="form-input">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="localizacao"><i data-feather="map-pin" class="icon-small text-muted"></i> Localização</label>
                            <input type="text" id="localizacao" name="localizacao" class="form-input">
                        </div>
                    </div>
                    
                    <div style="margin-top: 24px; display: flex; gap: 16px;">
                        <button type="submit" class="btn btn-primary" id="btn-save">
                            <i data-feather="save"></i> Salvar Alterações
                        </button>
                        <a href="/historico" class="btn btn-secondary">
                            <i data-feather="x"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </main>
    </div>
    
    <script>feather.replace();</script>
    <script src="/static/js/editar.js"></script>
</body>
</html>
